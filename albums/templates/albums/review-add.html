{% extends 'base.html' %}

{% block content %}
    <h1>Write a Review for {{ album.title }}</h1>

    <p style="color: #666; font-style: italic; margin-top: -15px;">
        Format: {{ album.get_music_format_display }}
    </p>

    <hr>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Post Review</button>
        <a href="{% url 'album-details' album.pk %}" class="btn">Cancel</a>
    </form>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
    <div class="container">
        <h2>Suggest a New Album</h2>
        <p>Your suggestion will be reviewed by an administrator before appearing on the site.</p>
        <hr>
        
        <form method="post">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit" class="btn btn-success">Submit for Approval</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}

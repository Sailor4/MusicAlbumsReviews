{% extends 'base.html' %}
{% block content %}
    <h1>Delete Album: {{ object.title }}</h1>
    <p>Are you sure you want to delete this album? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn" style="background: red; color: white;">Yes, Delete</button>
        <a href="{% url 'my-albums' %}" class="btn">Cancel</a>
    </form>
{% endblock %}

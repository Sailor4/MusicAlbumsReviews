{% extends 'base.html' %}

{% block content %}
    <div style="max-width: 450px; margin: 40px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-top: 0;">Create an Account</h2>
        <p>Join Music Albums Reviews to start contributing!</p>
        <hr style="margin-bottom: 25px;">

        <form method="post" novalidate>
            {% csrf_token %}

            {% for field in form %}
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">{{ field.label }}</label>


                    {{ field }}


                    {% if field.errors %}
                        <div style="color: #e74c3c; font-size: 0.85em; margin-top: 5px;">
                            {{ field.errors }}
                        </div>
                    {% endif %}

                    
                </div>
            {% endfor %}

            <button type="submit" class="btn" style="background: #27ae60; color: white; width: 100%; padding: 12px; font-size: 1em; border: none; border-radius: 6px; cursor: pointer;">
                Sign Up
            </button>
        </form>

        <p style="margin-top: 20px; text-align: center; font-size: 0.9em;">
            Already have an account? <a href="{% url 'login' %}">Login here</a>.
        </p>
    </div>
{% endblock %}

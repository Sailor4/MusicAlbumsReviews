<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Albums Reviews</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        nav { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .btn { padding: 5px 10px; text-decoration: none; background: #eee; border: 1px solid #999; }
    </style>
</head>
<body>
    <nav>
    <a href="{% url 'home' %}">Home</a> |
    <a href="{% url 'album-search' %}">Search</a> |
    <a href="{% url 'contact' %}">Contact</a> |

    {% if user.is_authenticated %}
        <a href="{% url 'artist-add' %}">Suggest Artist</a> |
        <a href="{% url 'album-add' %}">Add Album</a> |

        <a href="{% url 'my-albums' %}">My Contributions</a> |
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline; font-family:inherit; font-size:inherit; padding:0;">
                Logout ({{ user.username }})
            </button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">Login</a> |
        <a href="{% url 'signup' %}">Sign Up</a>
    {% endif %}
</nav>

    <main>
        {% if messages %}
        <div style="margin: 20px;">
        {% for message in messages %}
            <div style="padding: 15px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px;">
                {{ message }}
            </div>
        {% endfor %}
        </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
